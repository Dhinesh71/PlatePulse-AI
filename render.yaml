services:
  - type: web
    name: platevision-ai
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300
    healthCheckPath: /health
    envVars:
      - key: PLATEVISION_DATA_DIR
        value: /var/data
    disk:
      name: platevision-data
      mountPath: /var/data
      sizeGB: 1
